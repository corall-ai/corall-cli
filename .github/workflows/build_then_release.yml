name: Build then release

on:
  push:
    tags:
      - "v*"
    branches:
      - "main"

env:
  CARGO_TERM_COLOR: always

jobs:
  gen_version:
    name: Generate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.generated-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Get latest tag
        id: get-latest-tag
        run: |
          echo "tag=`gh release list -L 1 | cut -f 1`" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump version
        id: generated-tag
        uses: actions/github-script@v6
        with:
          script: |
            if (context.ref.startsWith("refs/tags/")) {
              let tag = context.ref.replace("refs/tags/", "");
              core.setOutput('tag', tag);
              console.log(`This event pushed a tag ${tag}, return directly.`)
              return
            }
            console.log('Use default tag "prerelease".')
            core.setOutput('tag', 'prerelease');

  build:
    needs: gen_version
    name: Build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            build_env: {}
          - target: x86_64-apple-darwin
            runner: macos-14
            build_env: {}
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            build_env: {}
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            build_env:
              CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-Clink-self-contained=yes -Clinker=rust-lld"
              CC_aarch64_unknown_linux_musl: clang
              AR_aarch64_unknown_linux_musl: llvm-ar

    steps:
      - uses: actions/checkout@v4
      - name: Install musl-tools
        if: matrix.runner == 'ubuntu-latest'
        run: sudo apt update && sudo apt install -y musl-tools
      - name: Install cross build deps for aarch64-unknown-linux-musl
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: sudo apt update && sudo apt install -y clang llvm gcc-aarch64-linux-gnu
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Setup rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-then-release-${{ matrix.target }}-v1
      - name: Build
        env: ${{ matrix.build_env }}
        run: |
          cargo build --release --target ${{ matrix.target }}
      - name: Compress
        run: |
          zip -j corall-${{ needs.gen_version.outputs.version }}-${{ matrix.target }}.zip ./target/${{ matrix.target }}/release/corall
      - uses: actions/upload-artifact@v4
        name: Upload artifacts
        with:
          name: corall-${{ needs.gen_version.outputs.version }}-${{ matrix.target }}
          path: "*.zip"
          retention-days: 1

  release:
    needs: [gen_version, build]
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: "-vv --strip header ${{ needs.gen_version.outputs.version == 'prerelease' && '--unreleased' || '--latest' }}"
      - uses: actions/download-artifact@v4
      - name: Display fetched artifacts
        run: ls -R
      - name: Move directory for release
        run: |
          mkdir release &&
          mv corall-${{ needs.gen_version.outputs.version }}-aarch64-apple-darwin/*.zip release &&
          mv corall-${{ needs.gen_version.outputs.version }}-x86_64-apple-darwin/*.zip release &&
          mv corall-${{ needs.gen_version.outputs.version }}-x86_64-unknown-linux-musl/*.zip release &&
          mv corall-${{ needs.gen_version.outputs.version }}-aarch64-unknown-linux-musl/*.zip release &&
          mv LICENSE release
      - uses: svenstaro/upload-release-action@v2
        name: Emit a Github Release
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          body: "${{ steps.git-cliff.outputs.content }}"
          tag: ${{ needs.gen_version.outputs.version }}
          prerelease: ${{ needs.gen_version.outputs.version == 'prerelease' }}
          file_glob: true
          overwrite: true
          file: release/*
